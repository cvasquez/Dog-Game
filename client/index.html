<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dog Digging Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Lobby overlay -->
  <div id="lobby">
    <div class="lobby-box">
      <h1>🐕 Dog Digging Game</h1>
      <p class="subtitle">Dig deep, find treasure, decorate your park!</p>

      <div class="form-group">
        <label>Your Dog's Name</label>
        <input type="text" id="playerName" value="Biscuit" maxlength="20">
      </div>

      <div class="form-group">
        <label>Choose Your Breed</label>
        <div class="breed-picker" id="breedPicker">
          <button class="breed-btn selected" data-breed="0">
            <span class="breed-icon" style="background: #C49A6C"></span>
            <span class="breed-info"><strong>Labrador</strong><br><small>All-rounder. High stamina.</small></span>
          </button>
          <button class="breed-btn" data-breed="1">
            <span class="breed-icon" style="background: #8B4513"></span>
            <span class="breed-info"><strong>Dachshund</strong><br><small>Fast digger, low stamina.</small></span>
          </button>
          <button class="breed-btn" data-breed="2">
            <span class="breed-icon" style="background: #B0B0B0"></span>
            <span class="breed-info"><strong>Husky</strong><br><small>Fast runner, great climber.</small></span>
          </button>
          <button class="breed-btn" data-breed="3">
            <span class="breed-icon" style="background: #D2B48C"></span>
            <span class="breed-info"><strong>Terrier</strong><br><small>Treasure hunter, extra loot.</small></span>
          </button>
        </div>
      </div>

      <button id="soloBtn" class="btn btn-primary">Play Solo</button>

      <div class="divider"><span>or load a saved world</span></div>
      <button id="loadBtn" class="btn btn-secondary">Load Saved World</button>
      <div id="worldList" class="world-list" style="display:none"></div>

      <div class="divider"><span>multiplayer (requires server)</span></div>

      <button id="createBtn" class="btn btn-secondary">Create Room</button>

      <div class="join-row" style="margin-top:8px">
        <input type="text" id="roomInput" placeholder="Room code" maxlength="6">
        <button id="joinBtn" class="btn">Join</button>
      </div>

      <div id="lobbyError" class="error"></div>
    </div>
  </div>

  <!-- Game canvas -->
  <canvas id="gameCanvas"></canvas>

  <!-- HUD elements -->
  <div id="hud" style="display:none">
    <div id="resourceBar"></div>
    <div id="depthMeter"></div>
    <div id="roomCode"></div>
    <div id="playerList"></div>
  </div>

  <!-- Shop overlay -->
  <div id="shopOverlay" style="display:none">
    <div class="shop-box">
      <h2>Shop</h2>
      <div class="shop-tabs">
        <button class="shop-tab active" data-tab="decorations">Decorations</button>
        <button class="shop-tab" data-tab="emotes">Emotes</button>
        <button class="shop-tab" data-tab="upgrades">Upgrades</button>
      </div>
      <div id="shopItems"></div>
      <button id="shopClose" class="btn">Close (B)</button>
    </div>
  </div>

  <!-- Emote wheel (canvas-rendered) -->
  <canvas id="emoteWheel" style="display:none"></canvas>

  <!-- Notifications -->
  <div id="notifications"></div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
