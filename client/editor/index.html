<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dog Sprite &amp; Decoration Editor</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #1a1a2e; color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; display: flex; height: 100vh; overflow: hidden; }
.sidebar { width: 220px; background: #16213e; padding: 12px; display: flex; flex-direction: column; gap: 10px; border-right: 1px solid #333; overflow-y: auto; }
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.toolbar { display: flex; gap: 8px; padding: 8px 12px; background: #16213e; border-bottom: 1px solid #333; align-items: center; flex-wrap: wrap; }
.canvas-area { flex: 1; display: flex; align-items: center; justify-content: center; gap: 40px; padding: 20px; overflow: auto; }
label { font-size: 12px; color: #aaa; display: block; margin-bottom: 3px; }
select, button { background: #0f3460; color: #e0e0e0; border: 1px solid #444; padding: 5px 8px; border-radius: 4px; cursor: pointer; font-size: 13px; }
select:hover, button:hover { background: #1a4a7a; }
button.active { background: #e94560; border-color: #e94560; }
h3 { font-size: 13px; color: #4fc3f7; border-bottom: 1px solid #333; padding-bottom: 4px; }

/* Palette */
.palette { display: flex; flex-wrap: wrap; gap: 4px; }
.pal-btn { width: 32px; height: 32px; border: 2px solid transparent; border-radius: 4px; cursor: pointer; position: relative; }
.pal-btn.selected { border-color: #fff; box-shadow: 0 0 6px rgba(255,255,255,0.5); }
.pal-btn .idx { position: absolute; bottom: 1px; right: 2px; font-size: 8px; color: rgba(255,255,255,0.6); }

/* Grid */
.grid-wrap { position: relative; }
.grid-canvas { image-rendering: pixelated; cursor: crosshair; border: 2px solid #444; }

/* Preview */
.preview-section { display: flex; flex-direction: column; align-items: center; gap: 12px; }
.preview-canvas { image-rendering: pixelated; border: 1px solid #444; background: #0a0a1a; }
.preview-controls { display: flex; gap: 6px; align-items: center; }

/* Frame list */
.frame-list { display: flex; gap: 4px; flex-wrap: wrap; }
.frame-btn { width: 40px; height: 40px; image-rendering: pixelated; border: 2px solid transparent; cursor: pointer; background: #111; border-radius: 3px; }
.frame-btn.selected { border-color: #4fc3f7; }
.frame-btn canvas { width: 100%; height: 100%; image-rendering: pixelated; }

/* Anim tabs */
.anim-tabs { display: flex; flex-wrap: wrap; gap: 3px; }
.anim-tab { padding: 4px 8px; font-size: 11px; border-radius: 3px; }
.anim-tab.active { background: #e94560; border-color: #e94560; }

/* Export area */
.export-area { background: #111; padding: 8px; border-radius: 4px; font-size: 11px; max-height: 150px; overflow-y: auto; }
#exportOutput { width: 100%; height: 100px; background: #0a0a1a; color: #76FF03; border: 1px solid #333; font-family: monospace; font-size: 10px; resize: vertical; }

/* Cloud save modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: #16213e; border: 1px solid #444; border-radius: 8px; padding: 20px; min-width: 400px; max-width: 600px; max-height: 80vh; overflow-y: auto; }
.modal h3 { margin-bottom: 12px; }
.modal input[type="text"] { background: #0a0a1a; color: #e0e0e0; border: 1px solid #444; padding: 6px 8px; border-radius: 4px; font-size: 13px; width: 100%; margin-bottom: 8px; }
.modal .btn-row { display: flex; gap: 8px; margin-top: 12px; }
.sprite-list { display: flex; flex-direction: column; gap: 6px; max-height: 300px; overflow-y: auto; }
.sprite-item { display: flex; align-items: center; gap: 10px; padding: 8px; background: #0f3460; border-radius: 4px; cursor: pointer; border: 1px solid transparent; }
.sprite-item:hover { border-color: #4fc3f7; }
.sprite-item .sprite-info { flex: 1; }
.sprite-item .sprite-info .name { font-weight: bold; font-size: 13px; }
.sprite-item .sprite-info .meta { font-size: 11px; color: #888; }
.sprite-item .sprite-actions { display: flex; gap: 4px; }
.sprite-item .sprite-actions button { font-size: 11px; padding: 3px 6px; }
.cloud-status { font-size: 11px; padding: 4px 0; }
.cloud-status.ok { color: #76FF03; }
.cloud-status.err { color: #e94560; }
</style>
</head>
<body>

  <h3>Mode</h3>
  <div style="display:flex;gap:4px">
    <button id="modeBreeds" class="active">Breeds</button>

  <div class="toolbar">
    <span style="font-weight:bold;color:#4fc3f7">Dog Sprite &amp; Decoration Editor</span>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script type="module">
import { DOG_BREEDS, DECORATIONS } from '../../shared/constants.js';
import { DOG_SPRITES, SPRITE_PALETTE, ANIM_STATES, DECORATION_SPRITES, DECORATION_PALETTES } from '../../shared/sprite-data.js';

// Working sprite data — will be replaced by DB data on load
let sprites = JSON.parse(JSON.stringify(DOG_SPRITES));
let customPalette = [...SPRITE_PALETTE];

// Decoration working data
let decorationSprites = JSON.parse(JSON.stringify(DECORATION_SPRITES));
let decorationPalettes = JSON.parse(JSON.stringify(DECORATION_PALETTES));

// Track Supabase row IDs per breed so we can update in place
const dbRowIds = {}; // breed_key -> uuid

const CELL_SIZE = 24; // pixels per cell on editor grid
const MAX_PALETTE = 16; // single hex digit: 0-9, a-f

// State
let editorMode = 'breeds'; // 'breeds' or 'decorations'
let currentBreed = 'labrador';
let currentAnim = 'idle';
let currentFrame = 0;
let currentDecoration = 0;
let currentPalIdx = 1;
let currentTool = 'pen'; // pen, erase, fill
let playing = false;
let playTimer = null;
let playFrame = 0;

// DOM
const breedSelect = document.getElementById('breedSelect');
const animTabs = document.getElementById('animTabs');
const frameList = document.getElementById('frameList');
const paletteEl = document.getElementById('palette');
const gridCanvas = document.getElementById('gridCanvas');
const gridCtx = gridCanvas.getContext('2d');
const preview1x = document.getElementById('preview1x');
const preview2x = document.getElementById('preview2x');
const preview4x = document.getElementById('preview4x');
const animPreview = document.getElementById('animPreview');
const statusText = document.getElementById('statusText');

// Helper to get current grid dimensions
function getGridDims() {
  if (editorMode === 'decorations') {
    const dec = DECORATIONS.find(d => d.id === currentDecoration);
    return { w: (dec ? dec.w : 1) * 16, h: (dec ? dec.h : 1) * 16 };
  }
  return { w: 16, h: 16 };
}

// ------ Init ------

// Decoration selector
const decorationSelect = document.getElementById('decorationSelect');
DECORATIONS.forEach(d => {
  const opt = document.createElement('option');
  opt.value = d.id;
  opt.textContent = d.name;
  decorationSelect.appendChild(opt);
});
decorationSelect.addEventListener('change', () => {
  currentDecoration = parseInt(decorationSelect.value);
  rebuildUI();
});

// Mode toggle
document.getElementById('modeBreeds').addEventListener('click', () => {
  editorMode = 'breeds';
  document.getElementById('modeBreeds').className = 'active';
  document.getElementById('modeDecorations').className = '';
  document.getElementById('breedSection').style.display = '';
  document.getElementById('decorationSection').style.display = 'none';
  rebuildUI();
});
document.getElementById('modeDecorations').addEventListener('click', () => {
  editorMode = 'decorations';
  document.getElementById('modeDecorations').className = 'active';
  document.getElementById('modeBreeds').className = '';
  document.getElementById('breedSection').style.display = 'none';
  document.getElementById('decorationSection').style.display = '';
  rebuildUI();
});

// Breed selector
DOG_BREEDS.forEach((b, i) => {
  const opt = document.createElement('option');
  opt.value = b.name.toLowerCase();
  opt.textContent = b.name;
  breedSelect.appendChild(opt);
});
breedSelect.addEventListener('change', () => {
  currentBreed = breedSelect.value;
  currentFrame = 0;
  rebuildUI();
});

// Anim tabs
function buildAnimTabs() {
  animTabs.innerHTML = '';
  ANIM_STATES.forEach(state => {
    const btn = document.createElement('button');
    btn.className = 'anim-tab' + (state === currentAnim ? ' active' : '');
    btn.textContent = state;
    btn.addEventListener('click', () => {
      currentAnim = state;
      currentFrame = 0;
      rebuildUI();
    });
    animTabs.appendChild(btn);
  });
}

// Palette
function resolvePalette() {
  if (editorMode === 'decorations') {
    return decorationPalettes[currentDecoration] || [null];
  }
  const breed = DOG_BREEDS.find(b => b.name.toLowerCase() === currentBreed) || DOG_BREEDS[0];
  return customPalette.map(entry => {
    if (entry === 'body') return breed.colors.body;
    if (entry === 'dark') return breed.colors.dark;
    if (entry === 'light') return breed.colors.light;
    return entry;
  });
}

function buildPalette() {
  paletteEl.innerHTML = '';
  const resolved = resolvePalette();
  resolved.forEach((color, i) => {
    const btn = document.createElement('div');
    btn.className = 'pal-btn' + (i === currentPalIdx ? ' selected' : '');
    if (i === 0) {
      btn.style.background = 'repeating-conic-gradient(#666 0% 25%, #444 0% 50%) 50% / 8px 8px';
    } else {
      btn.style.background = color;
    }
    btn.innerHTML = `<span class="idx">${toHexChar(i)}</span>`;
    btn.addEventListener('click', () => {
      currentPalIdx = i;
      currentTool = 'pen';
      buildPalette();
      updateToolButtons();
    });
    paletteEl.appendChild(btn);
  });
}

// Frame list
function buildFrameList() {
  frameList.innerHTML = '';
  const frames = getFrames();
  frames.forEach((frame, i) => {
    const btn = document.createElement('div');
    btn.className = 'frame-btn' + (i === currentFrame ? ' selected' : '');
    // Render mini preview
    const c = renderFrame(frame, 40);
    btn.appendChild(c);
    btn.addEventListener('click', () => {
      currentFrame = i;
      rebuildUI();
    });
    frameList.appendChild(btn);
  });
}

// ------ Data access ------

function getFrames() {
  if (editorMode === 'decorations') {
    const pixels = decorationSprites[currentDecoration];
    return pixels ? [pixels] : [];
  }
  return sprites[currentBreed]?.[currentAnim] || [];
}

function getCurrentPixels() {
  const frames = getFrames();
  if (currentFrame >= frames.length) return null;
  return frames[currentFrame];
}

function toHexChar(val) {
  return val.toString(16);
}

function fromHexChar(ch) {
  return parseInt(ch, 16) || 0;
}

function setPixel(x, y, val) {
  if (editorMode === 'decorations') {
    const pixels = decorationSprites[currentDecoration];
    if (!pixels || y >= pixels.length) return;
    const row = pixels[y];
    decorationSprites[currentDecoration][y] = row.substring(0, x) + toHexChar(val) + row.substring(x + 1);
    return;
  }
  const frames = getFrames();
  if (currentFrame >= frames.length) return;
  const row = frames[currentFrame][y];
  frames[currentFrame][y] = row.substring(0, x) + toHexChar(val) + row.substring(x + 1);
}

function getPixel(x, y) {
  const pixels = getCurrentPixels();
  if (!pixels || y >= pixels.length) return 0;
  if (x >= pixels[y].length) return 0;
  return fromHexChar(pixels[y][x]);
}

function emptyFrame(w, h) {
  w = w || 16;
  h = h || 16;
  return Array(h).fill('0'.repeat(w));
}

// ------ Rendering ------

function renderFrame(pixelData, size) {
  const ph = pixelData.length;
  const pw = pixelData[0].length;
  const scale = size / Math.max(pw, ph);
  const c = document.createElement('canvas');
  c.width = Math.round(pw * scale);
  c.height = Math.round(ph * scale);
  const ctx = c.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  const resolved = resolvePalette();
  for (let y = 0; y < ph; y++) {
    for (let x = 0; x < pw; x++) {
      const idx = fromHexChar(pixelData[y][x]);
      if (idx === 0) continue;
      if (resolved[idx]) {
        ctx.fillStyle = resolved[idx];
        ctx.fillRect(Math.round(x * scale), Math.round(y * scale), Math.ceil(scale), Math.ceil(scale));
      }
    }
  }
  return c;
}

function drawGrid() {
  const { w: gridW, h: gridH } = getGridDims();
  const pixels = getCurrentPixels();
  const resolved = resolvePalette();

  // Resize canvas to fit grid
  gridCanvas.width = gridW * CELL_SIZE;
  gridCanvas.height = gridH * CELL_SIZE;

  gridCtx.clearRect(0, 0, gridCanvas.width, gridCanvas.height);

  // Background
  gridCtx.fillStyle = '#0a0a1a';
  gridCtx.fillRect(0, 0, gridCanvas.width, gridCanvas.height);

  // Checkerboard for transparency
  for (let y = 0; y < gridH; y++) {
    for (let x = 0; x < gridW; x++) {
      const px = x * CELL_SIZE;
      const py = y * CELL_SIZE;
      gridCtx.fillStyle = (x + y) % 2 === 0 ? '#1a1a2e' : '#222244';
      gridCtx.fillRect(px, py, CELL_SIZE, CELL_SIZE);

      if (pixels && y < pixels.length && x < pixels[y].length) {
        const idx = fromHexChar(pixels[y][x]);
        if (idx > 0 && resolved[idx]) {
          gridCtx.fillStyle = resolved[idx];
          gridCtx.fillRect(px, py, CELL_SIZE, CELL_SIZE);
        }
      }

      // Grid lines
      gridCtx.strokeStyle = 'rgba(255,255,255,0.08)';
      gridCtx.strokeRect(px + 0.5, py + 0.5, CELL_SIZE - 1, CELL_SIZE - 1);
    }
  }
}

function drawPreviews() {
  const pixels = getCurrentPixels();
  if (!pixels) return;

  const ph = pixels.length;
  const pw = pixels[0].length;

  // 1x
  preview1x.width = pw;
  preview1x.height = ph;
  const ctx1 = preview1x.getContext('2d');
  ctx1.imageSmoothingEnabled = false;
  ctx1.clearRect(0, 0, pw, ph);
  const c1 = renderFrame(pixels, Math.max(pw, ph));
  ctx1.drawImage(c1, 0, 0);

  // 2x
  preview2x.width = pw * 2;
  preview2x.height = ph * 2;
  const ctx2 = preview2x.getContext('2d');
  ctx2.imageSmoothingEnabled = false;
  ctx2.clearRect(0, 0, pw * 2, ph * 2);
  ctx2.drawImage(c1, 0, 0, pw * 2, ph * 2);

  // 4x
  preview4x.width = pw * 4;
  preview4x.height = ph * 4;
  const ctx4 = preview4x.getContext('2d');
  ctx4.imageSmoothingEnabled = false;
  ctx4.clearRect(0, 0, pw * 4, ph * 4);
  ctx4.drawImage(c1, 0, 0, pw * 4, ph * 4);
}

function drawAnimPreview() {
  const frames = getFrames();
  if (frames.length === 0) return;
  const idx = playFrame % frames.length;
  const pixels = frames[idx];
  const ph = pixels.length;
  const pw = pixels[0].length;
  animPreview.width = pw * 4;
  animPreview.height = ph * 4;
  const ctx = animPreview.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  ctx.clearRect(0, 0, pw * 4, ph * 4);
  const c = renderFrame(pixels, Math.max(pw, ph));
  ctx.drawImage(c, 0, 0, pw * 4, ph * 4);
}

// ------ Input ------

let painting = false;
let paintButton = 0;

function cellFromEvent(e) {
  const { w: gridW, h: gridH } = getGridDims();
  const rect = gridCanvas.getBoundingClientRect();
  const scaleX = gridCanvas.width / rect.width;
  const scaleY = gridCanvas.height / rect.height;
  const x = Math.floor((e.clientX - rect.left) * scaleX / CELL_SIZE);
  const y = Math.floor((e.clientY - rect.top) * scaleY / CELL_SIZE);
  if (x < 0 || x >= gridW || y < 0 || y >= gridH) return null;
  return { x, y };
}

function paintCell(x, y) {
  if (currentTool === 'pen') {
    setPixel(x, y, currentPalIdx);
  } else if (currentTool === 'erase') {
    setPixel(x, y, 0);
  } else if (currentTool === 'fill') {
    floodFill(x, y, getPixel(x, y), currentPalIdx);
  }
  drawGrid();
  drawPreviews();
}

function floodFill(x, y, target, replacement) {
  const { w: gridW, h: gridH } = getGridDims();
  if (target === replacement) return;
  if (x < 0 || x >= gridW || y < 0 || y >= gridH) return;
  if (getPixel(x, y) !== target) return;
  setPixel(x, y, replacement);
  floodFill(x + 1, y, target, replacement);
  floodFill(x - 1, y, target, replacement);
  floodFill(x, y + 1, target, replacement);
  floodFill(x, y - 1, target, replacement);
}

gridCanvas.addEventListener('mousedown', (e) => {
  e.preventDefault();
  painting = true;
  paintButton = e.button;
  const cell = cellFromEvent(e);
  if (!cell) return;
  if (e.button === 2) {
    // Right click = erase
    setPixel(cell.x, cell.y, 0);
    drawGrid();
    drawPreviews();
  } else {
    paintCell(cell.x, cell.y);
  }
});

gridCanvas.addEventListener('mousemove', (e) => {
  if (!painting) return;
  const cell = cellFromEvent(e);
  if (!cell) return;
  if (paintButton === 2) {
    setPixel(cell.x, cell.y, 0);
    drawGrid();
    drawPreviews();
  } else if (currentTool !== 'fill') {
    paintCell(cell.x, cell.y);
  }
});

gridCanvas.addEventListener('mouseup', () => { painting = false; });
gridCanvas.addEventListener('mouseleave', () => { painting = false; });
gridCanvas.addEventListener('contextmenu', (e) => e.preventDefault());

// ------ Tools ------

function updateToolButtons() {
  document.getElementById('toolPen').className = currentTool === 'pen' ? 'active' : '';
  document.getElementById('toolErase').className = currentTool === 'erase' ? 'active' : '';
  document.getElementById('toolFill').className = currentTool === 'fill' ? 'active' : '';
}

document.getElementById('toolPen').addEventListener('click', () => { currentTool = 'pen'; updateToolButtons(); });
document.getElementById('toolErase').addEventListener('click', () => { currentTool = 'erase'; updateToolButtons(); });
document.getElementById('toolFill').addEventListener('click', () => { currentTool = 'fill'; updateToolButtons(); });

// Add custom color
let addingColorIdx = -1;

function getActivePalette() {
  if (editorMode === 'decorations') return decorationPalettes[currentDecoration];
  return customPalette;
}

document.getElementById('addColor').addEventListener('click', () => {
  const pal = getActivePalette();
  if (pal.length >= MAX_PALETTE) {
    statusText.textContent = 'Max 16 palette entries (0-9, a-f)';
    setTimeout(() => { statusText.textContent = ''; }, 3000);
    return;
  }
  pal.push('#FF0000');
  addingColorIdx = pal.length - 1;
  currentPalIdx = addingColorIdx;
  currentTool = 'pen';
  rebuildUI();
  updateToolButtons();
  document.getElementById('colorPicker').click();
});

document.getElementById('colorPicker').addEventListener('input', (e) => {
  const pal = getActivePalette();
  if (addingColorIdx < 0 || addingColorIdx >= pal.length) return;
  pal[addingColorIdx] = e.target.value;
  rebuildUI();
});

document.getElementById('colorPicker').addEventListener('change', () => {
  addingColorIdx = -1;
});

// Frame management
document.getElementById('addFrame').addEventListener('click', () => {
  if (editorMode === 'decorations') return; // decorations are single-frame
  if (!sprites[currentBreed]) sprites[currentBreed] = {};
  if (!sprites[currentBreed][currentAnim]) sprites[currentBreed][currentAnim] = [];
  sprites[currentBreed][currentAnim].push(emptyFrame());
  currentFrame = sprites[currentBreed][currentAnim].length - 1;
  rebuildUI();
});

document.getElementById('delFrame').addEventListener('click', () => {
  const frames = getFrames();
  if (frames.length <= 1) return;
  frames.splice(currentFrame, 1);
  if (currentFrame >= frames.length) currentFrame = frames.length - 1;
  rebuildUI();
});

document.getElementById('dupeFrame').addEventListener('click', () => {
  const frames = getFrames();
  if (frames.length === 0) return;
  const copy = frames[currentFrame].slice();
  frames.splice(currentFrame + 1, 0, copy);
  currentFrame++;
  rebuildUI();
});

// Actions
document.getElementById('clearFrame').addEventListener('click', () => {
  const { w: gridW, h: gridH } = getGridDims();
  if (editorMode === 'decorations') {
    decorationSprites[currentDecoration] = emptyFrame(gridW, gridH);
    rebuildUI();
    return;
  }
  const frames = getFrames();
  if (currentFrame < frames.length) {
    frames[currentFrame] = emptyFrame();
    rebuildUI();
  }
});

let copiedFrame = null;

document.getElementById('copyFrame').addEventListener('click', () => {
  const pixels = getCurrentPixels();
  if (!pixels) return;
  copiedFrame = pixels.slice();
  statusText.textContent = 'Frame copied';
  setTimeout(() => { statusText.textContent = ''; }, 2000);
});

document.getElementById('pasteFrame').addEventListener('click', () => {
  if (!copiedFrame) {
    statusText.textContent = 'Nothing to paste';
    setTimeout(() => { statusText.textContent = ''; }, 2000);
    return;
  }
  const frames = getFrames();
  if (currentFrame >= frames.length) return;
  frames[currentFrame] = copiedFrame.slice();
  rebuildUI();
});

document.getElementById('mirrorH').addEventListener('click', () => {
  if (editorMode === 'decorations') {
    const pixels = decorationSprites[currentDecoration];
    if (!pixels) return;
    decorationSprites[currentDecoration] = pixels.map(row => row.split('').reverse().join(''));
    rebuildUI();
    return;
  }
  const frames = getFrames();
  if (currentFrame >= frames.length) return;
  frames[currentFrame] = frames[currentFrame].map(row => row.split('').reverse().join(''));
  rebuildUI();
});

function shiftPixels(dx, dy) {
  const { w: gridW, h: gridH } = getGridDims();
  if (editorMode === 'decorations') {
    const old = decorationSprites[currentDecoration];
    if (!old) return;
    const newFrame = emptyFrame(gridW, gridH);
    for (let y = 0; y < gridH; y++) {
      for (let x = 0; x < gridW; x++) {
        const sx = x - dx, sy = y - dy;
        if (sx >= 0 && sx < gridW && sy >= 0 && sy < gridH) {
          newFrame[y] = newFrame[y].substring(0, x) + old[sy][sx] + newFrame[y].substring(x + 1);
        }
      }
    }
    decorationSprites[currentDecoration] = newFrame;
    rebuildUI();
    return;
  }
  const frames = getFrames();
  if (currentFrame >= frames.length) return;
  const old = frames[currentFrame];
  const newFrame = emptyFrame(gridW, gridH);
  for (let y = 0; y < gridH; y++) {
    for (let x = 0; x < gridW; x++) {
      const sx = x - dx, sy = y - dy;
      if (sx >= 0 && sx < gridW && sy >= 0 && sy < gridH) {
        newFrame[y] = newFrame[y].substring(0, x) + old[sy][sx] + newFrame[y].substring(x + 1);
      }
    }
  }
  frames[currentFrame] = newFrame;
  rebuildUI();
}

document.getElementById('shiftUp').addEventListener('click', () => shiftPixels(0, -1));
document.getElementById('shiftDown').addEventListener('click', () => shiftPixels(0, 1));
document.getElementById('shiftLeft').addEventListener('click', () => shiftPixels(-1, 0));
document.getElementById('shiftRight').addEventListener('click', () => shiftPixels(1, 0));

// Playback
document.getElementById('playBtn').addEventListener('click', () => {
  playing = !playing;
  document.getElementById('playBtn').textContent = playing ? 'Stop' : 'Play';
  if (playing) {
    playFrame = 0;
    playTimer = setInterval(() => {
      playFrame++;
      drawAnimPreview();
    }, 125); // 8 FPS
  } else {
    clearInterval(playTimer);
  }
});

// ------ Export / Import ------

function serializeBreed(breedKey) {
  const data = sprites[breedKey];
  let out = `const ${breedKey} = {\n`;
  for (const anim of ANIM_STATES) {
    const frames = data[anim] || [];
    out += `  ${anim}: [`;
    for (let f = 0; f < frames.length; f++) {
      out += `[\n`;
      for (let r = 0; r < 16; r++) {
        out += `    "${frames[f][r]}",\n`;
      }
      out += `  ]`;
      if (f < frames.length - 1) out += ', ';
    }
    out += `],\n`;
  }
  out += `};\n`;
  return out;
}

function serializeDecoration(decId) {
  const dec = DECORATIONS.find(d => d.id === decId);
  const rows = decorationSprites[decId];
  if (!rows) return '';
  let out = `  // ${dec ? dec.name : 'Unknown'} (${dec ? dec.w : '?'}x${dec ? dec.h : '?'} tiles)\n`;
  out += `  ${decId}: [\n`;
  for (const row of rows) {
    out += `    "${row}",\n`;
  }
  out += `  ],\n`;
  return out;
}

function serializeAll() {
  let out = `// Auto-generated by Dog Sprite Editor\n`;
  out += `// Palette: 0=transparent, 1=body, 2=dark, 3=light, 4=black, 5=white, 6=pupil, 7=pink, 8=nose`;
  if (customPalette.length > 9) out += `, 9-${toHexChar(customPalette.length - 1)}=custom`;
  out += `\n\n`;
  out += `export const SPRITE_PALETTE = ${JSON.stringify(customPalette)};\n\n`;
  for (const key of Object.keys(sprites)) {
    out += serializeBreed(key);
    out += '\n';
  }
  out += `export const DOG_SPRITES = {\n`;
  out += Object.keys(sprites).map(k => `  ${k},`).join('\n');
  out += `\n};\n\n`;
  out += `export const ANIM_STATES = ${JSON.stringify(ANIM_STATES)};\n\n`;
  // Decoration data
  out += `export const DECORATION_PALETTES = ${JSON.stringify(decorationPalettes)};\n\n`;
  out += `export const DECORATION_SPRITES = {\n`;
  for (const decId of Object.keys(decorationSprites)) {
    out += serializeDecoration(parseInt(decId));
  }
  out += `};\n`;
  return out;
}

document.getElementById('exportBtn').addEventListener('click', async () => {
  const text = serializeAll();
  await navigator.clipboard.writeText(text);
  statusText.textContent = 'All sprite data copied to clipboard!';
  setTimeout(() => { statusText.textContent = ''; }, 3000);
});

document.getElementById('exportBreedBtn').addEventListener('click', async () => {
  if (editorMode === 'decorations') {
    const dec = DECORATIONS.find(d => d.id === currentDecoration);
    const text = serializeDecoration(currentDecoration);
    await navigator.clipboard.writeText(text);
    statusText.textContent = `${dec ? dec.name : 'Decoration'} data copied to clipboard!`;
    setTimeout(() => { statusText.textContent = ''; }, 3000);
    return;
  }
  const text = serializeBreed(currentBreed);
  await navigator.clipboard.writeText(text);
  statusText.textContent = `${currentBreed} data copied to clipboard!`;
  setTimeout(() => { statusText.textContent = ''; }, 3000);
});

document.getElementById('importBtn').addEventListener('click', async () => {
  try {
    const text = await navigator.clipboard.readText();
    // Try to evaluate as module-like JS to extract DOG_SPRITES
    // Simple approach: look for const declarations
    const breedNames = Object.keys(sprites);
    for (const name of breedNames) {
      const regex = new RegExp(`const ${name} = \\{([\\s\\S]*?)\\};`, 'm');
      const match = text.match(regex);
      if (match) {
        try {
          const obj = new Function(`return {${match[1]}};`)();
          sprites[name] = obj;
        } catch (e) {
          console.warn(`Failed to parse ${name}:`, e);
        }
      }
    }
    rebuildUI();
    statusText.textContent = 'Imported from clipboard!';
    setTimeout(() => { statusText.textContent = ''; }, 3000);
  } catch (e) {
    statusText.textContent = 'Import failed: ' + e.message;
  }
});

// Keyboard shortcuts
window.addEventListener('keydown', (e) => {
  const hexIdx = parseInt(e.key, 16);
  if (!isNaN(hexIdx) && hexIdx < customPalette.length && e.key.length === 1 && /[0-9a-f]/i.test(e.key)) {
    currentPalIdx = hexIdx;
    currentTool = 'pen';
    buildPalette();
    updateToolButtons();
    e.preventDefault();
  }
  if (e.key === 'e') { currentTool = 'erase'; updateToolButtons(); }
  if (e.key === 'p') { currentTool = 'pen'; updateToolButtons(); }
  if (e.key === 'f') { currentTool = 'fill'; updateToolButtons(); }
  if (e.key === 'ArrowLeft' && e.ctrlKey) {
    currentFrame = Math.max(0, currentFrame - 1);
    rebuildUI();
    e.preventDefault();
  }
  if (e.key === 'ArrowRight' && e.ctrlKey) {
    const frames = getFrames();
    currentFrame = Math.min(frames.length - 1, currentFrame + 1);
    rebuildUI();
    e.preventDefault();
  }
});

// ------ Master rebuild ------

function rebuildUI() {
  if (editorMode === 'breeds') {
    buildAnimTabs();
    buildFrameList();
    currentFrame = Math.min(currentFrame, Math.max(0, getFrames().length - 1));
  } else {
    currentFrame = 0;
    const dec = DECORATIONS.find(d => d.id === currentDecoration);
    const info = document.getElementById('decInfo');
    if (dec && info) {
      info.textContent = `${dec.w}x${dec.h} tiles (${dec.w*16}x${dec.h*16}px) - ${dec.desc}`;
    }
  }
  buildPalette();
  drawGrid();
  drawPreviews();
  drawAnimPreview();
  if (editorMode === 'decorations') {
    const dec = DECORATIONS.find(d => d.id === currentDecoration);
    statusText.textContent = `Decoration: ${dec ? dec.name : currentDecoration}`;
  } else {
    statusText.textContent = `${currentBreed} / ${currentAnim} / frame ${currentFrame}`;
  }
}

rebuildUI();
// Start animation preview
setInterval(drawAnimPreview, 125);

// ------ Supabase (database-first) ------

import { getSupabaseClient, isSupabaseConfigured } from '../js/supabase.js';

function showCloudStatus(msg, isError) {
  const el = document.getElementById('cloudStatus');
  el.textContent = msg;
  el.className = 'cloud-status ' + (isError ? 'err' : 'ok');
  setTimeout(() => { el.textContent = ''; }, 4000);
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// Load all sprites from Supabase on startup
async function loadSpritesFromDB() {
  if (!isSupabaseConfigured()) {
    showCloudStatus('Using local sprites (Supabase not configured)', true);
    return;
  }
  const sb = getSupabaseClient();
  if (!sb) return;

  showCloudStatus('Loading sprites from database...', false);

  const { data, error } = await sb.from('custom_sprites')
    .select('id, name, breed_key, sprite_data, palette, author, updated_at')
    .eq('is_public', true)
    .order('updated_at', { ascending: false });

  if (error) {
    showCloudStatus('DB load failed: ' + error.message, true);
    return;
  }

  if (!data || data.length === 0) {
    showCloudStatus('No sprites in DB. Using local defaults.', true);
    return;
  }

  // Use the most recent sprite per breed, populate working state
  const loaded = [];
  let paletteLoaded = false;
  for (const row of data) {
    const key = row.breed_key;
    if (!dbRowIds[key]) {
      dbRowIds[key] = row.id;
      sprites[key] = JSON.parse(JSON.stringify(row.sprite_data));
      // Use the palette with the most entries (preserves custom colors)
      if (row.palette && (!paletteLoaded || row.palette.length > customPalette.length)) {
        customPalette.length = 0;
        row.palette.forEach(p => customPalette.push(p));
        paletteLoaded = true;
      }
      loaded.push(key);
    }
  }

  rebuildUI();
  showCloudStatus(`Loaded ${loaded.length} breeds from DB: ${loaded.join(', ')}`, false);
}

// Save current breed to DB (upsert — update if row exists, insert if not)
async function saveBreedToDB(breedKey) {
  const sb = getSupabaseClient();
  if (!sb) {
    showCloudStatus('Supabase not configured', true);
    return false;
  }

  const spriteData = sprites[breedKey];
  const rowId = dbRowIds[breedKey];

  if (rowId) {
    // Update existing row
    const { error } = await sb.from('custom_sprites')
      .update({
        sprite_data: spriteData,
        palette: customPalette,
        updated_at: new Date().toISOString(),
      })
      .eq('id', rowId);
    if (error) {
      showCloudStatus('Save failed: ' + error.message, true);
      return false;
    }
  } else {
    // Insert new row
    const { data, error } = await sb.from('custom_sprites')
      .insert({
        name: `${breedKey} (default)`,
        breed_key: breedKey,
        sprite_data: spriteData,
        palette: customPalette,
        author: 'editor',
        is_public: true,
      })
      .select('id');
    if (error) {
      showCloudStatus('Save failed: ' + error.message, true);
      return false;
    }
    if (data && data[0]) dbRowIds[breedKey] = data[0].id;
  }
  return true;
}

// Save current breed
document.getElementById('cloudSaveBtn').addEventListener('click', async () => {
  showCloudStatus('Saving ' + currentBreed + '...', false);
  const ok = await saveBreedToDB(currentBreed);
  if (ok) showCloudStatus(`Saved ${currentBreed}`, false);
});

// Save all breeds
document.getElementById('cloudSaveAllBtn').addEventListener('click', async () => {
  showCloudStatus('Saving all breeds...', false);
  let saved = 0;
  for (const breedKey of Object.keys(sprites)) {
    const ok = await saveBreedToDB(breedKey);
    if (ok) saved++;
  }
  showCloudStatus(`Saved ${saved} breeds`, false);
});

const loadBreedFilter = document.getElementById('loadBreedFilter');
DOG_BREEDS.forEach(b => {

document.getElementById('cloudLoadBtn').addEventListener('click', () => {

document.getElementById('loadRefreshBtn').addEventListener('click', loadSpriteList);
loadBreedFilter.addEventListener('change', loadSpriteList);

async function loadSpriteList() {
  const sb = getSupabaseClient();
  if (!sb) return;
  const listEl = document.getElementById('spriteList');
  listEl.innerHTML = '<div style="color:#888;font-size:12px">Loading...</div>';

  let query = sb.from('custom_sprites')
    .select('id, name, breed_key, author, updated_at, sprite_data, palette')
    .eq('is_public', true)
    .order('updated_at', { ascending: false })
    .limit(50);

  const breedFilter = loadBreedFilter.value;
  if (breedFilter) query = query.eq('breed_key', breedFilter);

  const { data, error } = await query;

  if (error) {
    listEl.innerHTML = `<div class="cloud-status err">Error: ${error.message}</div>`;
    return;
  }
  if (!data || data.length === 0) {
    listEl.innerHTML = '<div style="color:#888;font-size:12px">No sprites found.</div>';
    return;
  }

  listEl.innerHTML = '';
  for (const row of data) {
    const item = document.createElement('div');
    item.className = 'sprite-item';
    const date = new Date(row.updated_at).toLocaleDateString();
    const isActive = dbRowIds[row.breed_key] === row.id;
    item.innerHTML = `
      <div class="sprite-info">
        <div class="name">${escapeHtml(row.name)}${isActive ? ' (active)' : ''}</div>
        <div class="meta">${escapeHtml(row.breed_key)} by ${escapeHtml(row.author || 'anonymous')} - ${date}</div>
      </div>
      <div class="sprite-actions">
        <button class="load-btn">Load</button>
        <button class="delete-btn" style="background:#5a1a1a">Del</button>
      </div>
    `;

    item.querySelector('.load-btn').addEventListener('click', () => {
      const key = row.breed_key;
      sprites[key] = JSON.parse(JSON.stringify(row.sprite_data));
      if (row.palette) {
        customPalette.length = 0;
        row.palette.forEach(p => customPalette.push(p));
      }
      dbRowIds[key] = row.id; // track this row for future saves
      currentBreed = key;
      breedSelect.value = key;
      currentFrame = 0;
      rebuildUI();
      document.getElementById('loadModal').classList.remove('open');
      showCloudStatus(`Loaded "${row.name}"`, false);
    });

    item.querySelector('.delete-btn').addEventListener('click', async (e) => {
      e.stopPropagation();
      if (!confirm(`Delete "${row.name}"?`)) return;
      const { error: delError } = await sb.from('custom_sprites').delete().eq('id', row.id);
      if (delError) {
        showCloudStatus('Delete failed: ' + delError.message, true);
      } else {
        if (dbRowIds[row.breed_key] === row.id) delete dbRowIds[row.breed_key];
        item.remove();
        showCloudStatus(`Deleted "${row.name}"`, false);
      }
    });

    listEl.appendChild(item);
  }
}

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) overlay.classList.remove('open');
  });

// --- Decoration DB persistence (Supabase with local server API fallback) ---

function showDecStatus(msg, isError) {
  const el = document.getElementById('decCloudStatus');
  el.textContent = msg;
  el.className = 'cloud-status ' + (isError ? 'err' : 'ok');
  setTimeout(() => { el.textContent = ''; }, 4000);
}

async function loadDecorationsFromDB() {
  // Try Supabase first
  if (isSupabaseConfigured()) {
    const sb = getSupabaseClient();
    if (sb) {
      try {
        showDecStatus('Loading decorations from database...', false);
        const { data, error } = await sb
          .from('decoration_sprites')
          .select('dec_id, pixels, palette')
          .order('dec_id');
        if (error) {
          showDecStatus('DB load failed: ' + error.message, true);
        } else if (!data || data.length === 0) {
          showDecStatus('No decorations in DB. Using local defaults.', true);
        } else {
          let count = 0;
          for (const row of data) {
            decorationSprites[row.dec_id] = row.pixels;
            decorationPalettes[row.dec_id] = row.palette;
            count++;
          }
          rebuildUI();
          showDecStatus(`Loaded ${count} decorations from DB`, false);
          return;
        }
      } catch {
        // Fall through to server API
      }
    }
  }
  // Fallback: local server API
  try {
    const res = await fetch('/api/decoration-sprites');
    if (!res.ok) return;
    const data = await res.json();
    let count = 0;
    if (data.sprites) {
      for (const [id, pixels] of Object.entries(data.sprites)) {
        decorationSprites[id] = pixels;
        count++;
      }
    }
    if (data.palettes) {
      for (const [id, palette] of Object.entries(data.palettes)) {
        decorationPalettes[id] = palette;
      }
    }
    rebuildUI();
    showDecStatus(`Loaded ${count} decorations from server`, false);
  } catch {
    // Server not available — keep file defaults
  }
}

async function saveDecorationToDB(decId) {
  const pixels = decorationSprites[decId];
  const palette = decorationPalettes[decId];
  if (!pixels || !palette) {
    showDecStatus('No sprite data for decoration ' + decId, true);
    return false;
  }

  // Try Supabase first
  if (isSupabaseConfigured()) {
    const sb = getSupabaseClient();
    if (sb) {
      try {
        const { error } = await sb
          .from('decoration_sprites')
          .upsert({
            dec_id: decId,
            pixels,
            palette,
            updated_at: new Date().toISOString(),
          }, { onConflict: 'dec_id' });
        if (error) {
          showDecStatus('Save failed: ' + error.message, true);
          return false;
        }
        return true;
      } catch (e) {
        showDecStatus('Supabase save failed: ' + e.message, true);
        return false;
      }
    }
  }

  // Fallback: local server API
  try {
    const res = await fetch('/api/decoration-sprites/' + decId, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pixels, palette }),
    });
    if (!res.ok) {
      showDecStatus('Save failed: ' + (await res.text()), true);
      return false;
    }
    return true;
  } catch (e) {
    showDecStatus('Save failed: ' + e.message, true);
    return false;
  }
}

document.getElementById('decLoadBtn').addEventListener('click', async () => {
  await loadDecorationsFromDB();
});

document.getElementById('decSaveBtn').addEventListener('click', async () => {
  const dec = DECORATIONS.find(d => d.id === currentDecoration);
  showDecStatus('Saving ' + (dec ? dec.name : 'decoration') + '...', false);
  const ok = await saveDecorationToDB(currentDecoration);
  if (ok) showDecStatus(`Saved ${dec ? dec.name : 'decoration ' + currentDecoration}`, false);
});

document.getElementById('decSaveAllBtn').addEventListener('click', async () => {
  showDecStatus('Saving all decorations...', false);
  let saved = 0;
  for (const decId of Object.keys(decorationSprites)) {
    const ok = await saveDecorationToDB(parseInt(decId));
    if (ok) saved++;
  }
  showDecStatus(`Saved ${saved} decorations`, false);
});
